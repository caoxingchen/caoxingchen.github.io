<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强基部点名系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: blue;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

       .main-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

       .main-title {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 40px;
        }

       .class-btn {
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            margin: 15px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

       .class-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }

       .container {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            text-align: center;
            display: none; 
        }

       .title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

       .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

       .back-btn {
            background: #95a5a6;
            margin-bottom: 20px;
        }
       .back-btn:hover {
            background: #7f8c8d;
        }

       .input-group {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #countInput1, #countInput2 {
            width: 120px;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #countInput1:focus, #countInput2:focus {
            border-color: #667eea;
        }

       .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

       .draw-btn {
            background: #667eea;
            color: white;
        }

       .draw-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

       .reset-btn {
            background: #ff6b6b;
            color: white;
        }

       .reset-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

       .result-area {
            margin-top: 30px;
            min-height: 150px;
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

       .name-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
        }

       .empty-tip {
            color: #999;
            font-size: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

       .name-item:nth-child(1) { animation-delay: 0.1s; }
       .name-item:nth-child(2) { animation-delay: 0.2s; }
       .name-item:nth-child(3) { animation-delay: 0.3s; }
       .name-item:nth-child(4) { animation-delay: 0.4s; }
       .name-item:nth-child(5) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="main-container" id="mainPage">
        <h1 class="main-title">强基部贯通班点名系统</h1>
        <button class="class-btn" onclick="selectClass(1)">强基部贯通一班</button>
        <button class="class-btn" onclick="selectClass(2)">强基部贯通二班</button>
    </div>

    <div class="container" id="class1Page">
        <button class="btn back-btn" onclick="backToMain()">返回主页</button>
        <h1 class="title">强基部贯通一班点名</h1>
        <p class="subtitle">随机、自动抽取</p>
        
        <div class="input-group">
            <input type="number" id="countInput1" min="1" placeholder="抽取人数" value="1">
            <button class="btn draw-btn" onclick="startDraw(1)">开始抽取</button>
            <button class="btn reset-btn" onclick="resetDraw(1)">重置清空</button>
        </div>

        <div class="result-area" id="resultArea1">
            <span class="empty-tip">点击上方按钮开始抽取</span>
        </div>
    </div>

    <!-- 二班点名界面 -->
    <div class="container" id="class2Page">
        <button class="btn back-btn" onclick="backToMain()">返回主页</button>
        <h1 class="title">强基部贯通二班点名</h1>
        <p class="subtitle">随机、自动抽取</p>
        
        <div class="input-group">
            <input type="number" id="countInput2" min="1" placeholder="抽取人数" value="1">
            <button class="btn draw-btn" onclick="startDraw(2)">开始抽取</button>
            <button class="btn reset-btn" onclick="resetDraw(2)">重置清空</button>
        </div>

        <div class="result-area" id="resultArea2">
            <span class="empty-tip">点击上方按钮开始抽取</span>
        </div>
    </div>

    <script>
        const class1List = [
            "迟月铭", "杜航宇", "范润泽", "高悦", "郭滨豪", "郭恒羽", "韩博宇", "黄烨轩",
            "黄梓露", "姜霁洋", "姜依晗", "蒋旭", "李军达", "李科震", "李雯", "李汶轩",
            "李玉熙", "刘兴航", "刘雨泽", "刘昭杰", "刘昭彤", "鲁丰博", "马浚鑫", "马晓宇",
            "马梓朕", "潘新予", "潘一帆", "庞振轩", "石宇宸", "司一萱", "宋昊阳", "孙纬彬",
            "王浩圳", "王烁恺", "王天佑", "王玥璋", "王岳彦", "王政永", "王子豪", "徐鹤轩",
            "徐萌", "徐熙哲", "颜子越", "杨程翔", "杨明轩", "张红业", "张钧强", "张峻溪",
            "张明宇", "张念隆", "张子谦", "赵浩程", "郑淏文", "郑岩", "朱文沪", "诸葛烨",
            "祝祥伟"
        ];

        const class2List = [
            "鲍柔溪", "卜凡芪", "曹泰民", "曹星辰", "陈炳赫", "陈浩瑜", "陈奕东", "冯彦文",
            "付瑞麟", "盖俊羽", "管明宇", "桓榕泽", "解皓霖", "鞠铮", "李浩睿", "李沫澜",
            "李佩恩", "李润泽", "李贞昊", "李知轩", "刘浩然", "刘鸿鸣", "刘荣轩", "刘欣仪",
            "刘译泽", "刘在源", "鲁子壕", "马家顺", "彭筱涵", "史致远", "苏雨轩", "孙国正",
            "孙瑞泽", "王浩宇", "王怀谦", "王磊", "王炜程", "王孜旭", "王梓帆", "吴昊原",
            "吴昊泽", "夏启程", "颜丙成", "杨天乐", "姚伊诺", "于子轩", "余泽佑", "张洛宁",
            "张麦琪", "张燕云", "张一顺", "张艺泽", "张雨辰", "郑景元", "郑永玏", "周子墨"
        ];

        function selectClass(classNum) {
            document.getElementById('mainPage').style.display = 'none';
            if(classNum === 1){
                document.getElementById('class1Page').style.display = 'block';
            }else{
                document.getElementById('class2Page').style.display = 'block';
            }
        }

        function backToMain() {
            document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
            document.getElementById('mainPage').style.display = 'block';
        }

        function startDraw(classNum) {
            const countInput = document.getElementById(`countInput${classNum}`);
            const resultArea = document.getElementById(`resultArea${classNum}`);
            const nameList = classNum === 1? class1List : class2List;
            
            // 获取输入的原始数值
            const inputValue = countInput.value.trim();
            const drawCount = Number(inputValue);

            // 1. 判断是否为小数（核心新增逻辑）
            if (!Number.isInteger(drawCount) &&!isNaN(drawCount)) {
                alert("请输入整数！抽取人数不支持小数");
                countInput.value = 1;
                return;
            }

            // 2. 判断无效数字/小于1
            if (isNaN(drawCount) || drawCount < 1) {
                alert("请输入有效的抽取人数（至少1人）");
                countInput.value = 1;
                return;
            }

            // 3. 判断超过总人数
            if (drawCount > nameList.length) {
                alert(`抽取人数不能超过总人数（共${nameList.length}人）`);
                countInput.value = nameList.length;
                drawCount = nameList.length;
            }

            const randomNames = getRandomNames(nameList, drawCount);
            showResult(randomNames, resultArea);
        }

        function getRandomNames(arr, count) {
            const tempArr = [...arr];
            const result = [];
            
            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * tempArr.length);
                result.push(tempArr[randomIndex]);
                tempArr.splice(randomIndex, 1);
            }
            
            return result;
        }

        function showResult(names, resultArea) {
            resultArea.innerHTML = '';
            names.forEach(name => {
                const nameDiv = document.createElement('div');
                nameDiv.className = 'name-item';
                nameDiv.textContent = name;
                resultArea.appendChild(nameDiv);
            });
        }

        function resetDraw(classNum) {
            document.getElementById(`resultArea${classNum}`).innerHTML = '<span class="empty-tip">点击上方按钮开始抽取</span>';
            document.getElementById(`countInput${classNum}`).value = 1;
        }
    </script>
</body>
</html>
